<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">Central workflow topology</title>
  <desc id="desc">A central toolkit repository provides the shared workflow core to separate project repositories through thin wrappers.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbfd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#20364b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#20364b"/>
    </marker>
  </defs>
  <rect width="980" height="460" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" fill="#20364b" font-family="Aptos, Segoe UI, sans-serif" font-size="30" font-weight="700">Central topology</text>
  <text x="60" y="100" fill="#5f6d7b" font-family="Aptos, Segoe UI, sans-serif" font-size="18">A shared toolkit serves several repos; each project keeps only its local layer and wrappers.</text>

  <rect x="70" y="140" width="310" height="230" rx="28" fill="url(#card)" stroke="#1f6d8c" stroke-width="3" filter="url(#shadow)"/>
  <rect x="95" y="170" width="260" height="56" rx="18" fill="#d8edf2"/>
  <text x="225" y="206" text-anchor="middle" fill="#1f6d8c" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Central Toolkit Repo</text>
  <rect x="105" y="248" width="240" height="84" rx="20" fill="#eef7fb" stroke="#1f6d8c" stroke-width="2"/>
  <text x="225" y="286" text-anchor="middle" fill="#1f6d8c" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Shared Workflow Core</text>
  <text x="225" y="312" text-anchor="middle" fill="#4f6478" font-family="Aptos, Segoe UI, sans-serif" font-size="17">generic scripts, docs, skills</text>

  <rect x="520" y="120" width="360" height="130" rx="26" fill="url(#card)" stroke="#c45a2b" stroke-width="3" filter="url(#shadow)"/>
  <text x="700" y="160" text-anchor="middle" fill="#c45a2b" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Project Repo A</text>
  <rect x="548" y="182" width="304" height="32" rx="12" fill="#fff8ef" stroke="#c45a2b" stroke-width="1.5"/>
  <text x="700" y="204" text-anchor="middle" fill="#7b5b48" font-family="Aptos, Segoe UI, sans-serif" font-size="16">project-specific layer</text>
  <rect x="548" y="220" width="304" height="32" rx="12" fill="#f4fafc" stroke="#1f6d8c" stroke-width="1.5"/>
  <text x="700" y="242" text-anchor="middle" fill="#4f6478" font-family="Aptos, Segoe UI, sans-serif" font-size="16">wrappers to central toolkit</text>

  <rect x="520" y="274" width="360" height="130" rx="26" fill="url(#card)" stroke="#c45a2b" stroke-width="3" filter="url(#shadow)"/>
  <text x="700" y="314" text-anchor="middle" fill="#c45a2b" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Project Repo B</text>
  <rect x="548" y="336" width="304" height="32" rx="12" fill="#fff8ef" stroke="#c45a2b" stroke-width="1.5"/>
  <text x="700" y="358" text-anchor="middle" fill="#7b5b48" font-family="Aptos, Segoe UI, sans-serif" font-size="16">project-specific layer</text>
  <rect x="548" y="374" width="304" height="32" rx="12" fill="#f4fafc" stroke="#1f6d8c" stroke-width="1.5"/>
  <text x="700" y="396" text-anchor="middle" fill="#4f6478" font-family="Aptos, Segoe UI, sans-serif" font-size="16">wrappers to central toolkit</text>

  <path d="M380 255 C455 255 448 187 520 187" stroke="#20364b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M380 286 C455 286 448 339 520 339" stroke="#20364b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="60" y="432" fill="#5f6d7b" font-family="Aptos, Segoe UI, sans-serif" font-size="18">Best when the reusable workflow core is stable and several projects should share the same toolkit.</text>
</svg>

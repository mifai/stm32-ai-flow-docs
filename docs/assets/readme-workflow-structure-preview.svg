<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">STM32 AI Flow README workflow structure preview</title>
  <desc id="desc">A two-zone diagram showing configuration on the left and the daily workflow on the right, including a target board that is flashed and validated as part of the workflow.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #fbfbfa; stroke: #9aa3ab; stroke-width: 1.5; rx: 16; ry: 16; }
      .box { fill: #ffffff; stroke: #5f6b73; stroke-width: 1.4; rx: 10; ry: 10; }
      .accent { fill: #eef5f0; stroke: #3f6f55; stroke-width: 1.8; rx: 10; ry: 10; }
      .muted { fill: #f7f8fa; stroke: #96a0a8; stroke-width: 1.3; rx: 10; ry: 10; }
      .target { fill: #eef2f8; stroke: #45627f; stroke-width: 1.7; rx: 10; ry: 10; }
      .label { font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 24px; font-weight: 600; fill: #263238; }
      .text { font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 18px; fill: #263238; }
      .small { font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #4b565d; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .note { font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #4b565d; text-anchor: middle; }
      .arrow { stroke: #5f6b73; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .soft { stroke: #8a949c; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#5f6b73" />
    </marker>
    <marker id="softhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#8a949c" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="470" />

  <rect class="panel" x="38" y="42" width="392" height="340" />
  <rect class="panel" x="434" y="42" width="584" height="340" />

  <text class="label" x="72" y="92">Configuration</text>
  <text class="label" x="468" y="92">Daily Workflow</text>

  <rect class="box" x="86" y="124" width="128" height="56" />
  <text class="text center" x="150" y="152">CubeMX</text>
  <text class="small" x="258" y="202">source of truth</text>

  <rect class="accent" x="248" y="124" width="128" height="56" />
  <text class="text center" x="312" y="152">.ioc</text>

  <line class="arrow" x1="214" y1="152" x2="248" y2="152" marker-end="url(#arrowhead)" />
  <line class="soft" x1="248" y1="168" x2="214" y2="168" marker-end="url(#softhead)" />

  <rect class="muted" x="224" y="244" width="176" height="54" />
  <text class="text center" x="312" y="271">Generated config</text>

  <line class="arrow" x1="312" y1="180" x2="312" y2="244" marker-end="url(#arrowhead)" />

  <text class="note" x="232" y="338">Change this side when hardware or</text>
  <text class="note" x="232" y="358">CubeMX-owned configuration changes.</text>

  <rect class="box" x="516" y="124" width="220" height="56" />
  <text class="text center" x="626" y="152">Project logic and modules</text>

  <rect class="target" x="800" y="124" width="150" height="56" />
  <text class="text center" x="875" y="152">Target board</text>

  <line class="arrow" x1="554" y1="180" x2="554" y2="222" marker-end="url(#arrowhead)" />

  <rect class="box" x="500" y="222" width="108" height="50" />
  <text class="text center" x="554" y="247">Build</text>

  <rect class="box" x="655" y="222" width="108" height="50" />
  <text class="text center" x="709" y="247">Flash</text>

  <rect class="box" x="815" y="222" width="116" height="50" />
  <text class="text center" x="873" y="247">Validate</text>

  <rect class="box" x="955" y="222" width="60" height="50" />
  <text class="text center" x="985" y="247">Log</text>

  <line class="arrow" x1="608" y1="247" x2="655" y2="247" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="763" y1="247" x2="815" y2="247" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="931" y1="247" x2="955" y2="247" marker-end="url(#arrowhead)" />

  <line class="arrow" x1="709" y1="222" x2="800" y2="152" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="875" y1="180" x2="873" y2="222" marker-end="url(#arrowhead)" />

  <path class="soft" d="M985 272 L985 308 Q985 322 971 322 L554 322 Q540 322 540 308 L540 272" marker-end="url(#softhead)" />

  <text class="note" x="770" y="352">Daily work usually stays here.</text>

  <line class="arrow" x1="400" y1="244" x2="516" y2="160" marker-end="url(#arrowhead)" />
  <rect class="bg" x="394" y="195" width="112" height="18" transform="rotate(-36 450 204)" />
  <text class="small center" x="450" y="204" transform="rotate(-36 450 204)">config changes</text>
</svg>

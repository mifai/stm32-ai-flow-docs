<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Vendored workflow topology</title>
  <desc id="desc">A single project repository containing both the project-specific layer and the local workflow core.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbfd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#20364b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="430" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" fill="#20364b" font-family="Aptos, Segoe UI, sans-serif" font-size="30" font-weight="700">Vendored topology</text>
  <text x="60" y="100" fill="#5f6d7b" font-family="Aptos, Segoe UI, sans-serif" font-size="18">One repo carries both the evolving project layer and its local workflow copy.</text>

  <rect x="80" y="140" width="740" height="220" rx="28" fill="url(#card)" stroke="#1f6d8c" stroke-width="3" filter="url(#shadow)"/>
  <rect x="110" y="170" width="680" height="56" rx="18" fill="#d8edf2"/>
  <text x="450" y="206" text-anchor="middle" fill="#1f6d8c" font-family="Aptos, Segoe UI, sans-serif" font-size="26" font-weight="700">Project Repository</text>

  <rect x="130" y="250" width="300" height="82" rx="20" fill="#fff8ef" stroke="#c45a2b" stroke-width="2"/>
  <text x="280" y="286" text-anchor="middle" fill="#c45a2b" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Project-Specific Layer</text>
  <text x="280" y="312" text-anchor="middle" fill="#7b5b48" font-family="Aptos, Segoe UI, sans-serif" font-size="17">firmware, board files, local docs</text>

  <rect x="470" y="250" width="300" height="82" rx="20" fill="#eef7fb" stroke="#1f6d8c" stroke-width="2"/>
  <text x="620" y="286" text-anchor="middle" fill="#1f6d8c" font-family="Aptos, Segoe UI, sans-serif" font-size="24" font-weight="700">Local Workflow Core</text>
  <text x="620" y="312" text-anchor="middle" fill="#4f6478" font-family="Aptos, Segoe UI, sans-serif" font-size="17">scripts, docs, skills, schema</text>

  <path d="M430 291 H470" stroke="#20364b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="450" cy="291" r="7" fill="#20364b"/>

  <text x="80" y="392" fill="#5f6d7b" font-family="Aptos, Segoe UI, sans-serif" font-size="18">Best when the workflow is still evolving with the project and the repo should stay self-contained.</text>
</svg>
